# ===============================
# = SERVICE NAME & PORT
# ===============================

spring.application.name=airway-srv-api
server.port=8600
spring.main.allow-bean-definition-overriding=true

# ===============================
# = JACKSON CONFIG
# ===============================

spring.jackson.time-zone=GMT+3

# ===============================
# = LOGGING CONFIG
# ===============================

logging.file.name=_log/${spring.application.name}/application.log
logging.pattern.file=%d %-5level [%thread] %logger : %msg%n
logging.pattern.console="%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

logging.level.org.springframework.web=INFO
logging.level.org.springframework.data=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=INFO
logging.level.com.thy.cloud=DEBUG

# ===============================
# = ACTUATOR CONFIG
# ===============================

management.endpoint.metrics.enabled=true
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

# ===============================
# = DATASOURCE CONFIG
# ===============================

spring.datasource.url=jdbc:postgresql://92.205.129.27:5434/intermodal
spring.datasource.username=intermodal
spring.datasource.password=Cloud5231!
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# = JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=intermodal
spring.datasource.hikari.connection-init-sql=SET search_path TO intermodal,public

# ===============================
# = FLYWAY CONFIG
# ===============================

spring.flyway.enabled=false
spring.flyway.locations=filesystem:../../_db/migrations
spring.flyway.default-schema=intermodal
spring.flyway.schemas=intermodal
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true

# ===============================
# = GOOGLE MAPS API
# ===============================

google.api.key=
google.api.places.enabled=true
google.api.directions.enabled=true

# ===============================
# = JWT CONFIG
# ===============================

jwt.secret=intermodal-journey-planning-secret-key-2026-minimum-32-chars
jwt.expiration-ms=86400000

# ===============================
# = REDIS CONFIG
# ===============================

spring.data.redis.host=92.205.129.27
spring.data.redis.port=6379

# ===============================
# = CACHE CONFIG (airway-data-cache)
# ===============================

thy.cache.redis.enabled=true
thy.cache.redis.global-config.time-to-live=1h
thy.cache.redis.configs.policy\:constraints.time-to-live=10m
thy.cache.redis.configs.policy\:constraints.cache-null-values=false
